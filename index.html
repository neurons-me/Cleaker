<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cleaker</title>
    <script>
      window.__cleakerRuntimeAssets = (function () {
        const LOCAL_CSS = "../../this/GUI/npm/dist/styles.css";
        const LOCAL_GUI = "../../this/GUI/npm/dist/this.gui.umd.js";
        const LOCAL_REACT = "../../this/GUI/npm/node_modules/react/umd/react.production.min.js";
        const LOCAL_REACTDOM = "../../this/GUI/npm/node_modules/react-dom/umd/react-dom.production.min.js";
        const CDN_CSS = "https://cdn.jsdelivr.net/npm/this.gui@latest/dist/styles.css";
        const CDN_GUI = "https://cdn.jsdelivr.net/npm/this.gui@latest/dist/this.gui.umd.js";
        const CDN_REACT = "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js";
        const CDN_REACTDOM = "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js";
        const protocol = String(window.location.protocol || "").toLowerCase();
        const useLocal = protocol === "file:";

        return useLocal
          ? {
              source: "local",
              css: LOCAL_CSS,
              gui: LOCAL_GUI,
              react: LOCAL_REACT,
              reactdom: LOCAL_REACTDOM,
            }
          : {
              source: "cdn",
              css: CDN_CSS,
              gui: CDN_GUI,
              react: CDN_REACT,
              reactdom: CDN_REACTDOM,
            };
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(107, 176, 255, 0.16), transparent 34%),
          radial-gradient(circle at bottom, rgba(55, 143, 92, 0.14), transparent 28%),
          #06090d;
      }

      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #f1f5f9;
      }

      .gui-leftbar-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 60px;
        justify-content: center;
        padding: 6px 10px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
      }

      .gui-leftbar-logo-mark {
        display: block;
        flex: 0 0 auto;
      }

      .gui-leftbar-logo-label {
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .gui-leftbar-rail .gui-leftbar-logo {
        justify-content: center;
        padding: 6px 6px;
      }

      .gui-leftbar-rail .gui-leftbar-logo-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-logo {
        justify-content: flex-start;
      }

      .gui-leftbar-cleaker-qr {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 72px;
        justify-content: center;
        padding: 6px 10px;
        box-sizing: border-box;
        color: inherit;
        overflow: hidden;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-cleaker-qr:hover {
        opacity: 0.92;
      }

      .gui-leftbar-cleaker-qr-canvas {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        line-height: 0;
        min-width: 0;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.QR.Icon"] {
        width: auto !important;
        display: flex !important;
        justify-content: center;
      }

      .gui-leftbar-cleaker-qr-label {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        white-space: nowrap;
        opacity: 0.88;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr {
        justify-content: center;
        padding: 6px 4px;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-cleaker-qr {
        justify-content: flex-start;
      }

      .gui-leftbar-footer-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 44px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
        opacity: 0.72;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-footer-logo:hover {
        opacity: 1;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(122, 162, 247, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(122, 162, 247, 0.08) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
        opacity: 0.18;
      }

      #root {
        min-height: 100vh;
      }

      #root > div[style*="position: fixed"] {
        display: none !important;
      }

    </style>
  </head>
  <body>

    <div id="root"></div>

    <script>
      window.__startCleakerApp = function () {
      (function () {
        const root = document.getElementById("root");
        const GUI = window.GUI;
        const React = window.React;
        const DEFAULT_CLEAKER_THEME_ID = "mdrn.church";
        const DEFAULT_CLEAKER_THEME_MODE = "light";
        if (!root) return;

        if (!GUI || typeof GUI.mount !== "function" || !React) {
          root.innerHTML =
            '<div style="padding:24px;font:14px/1.5 ui-sans-serif,system-ui;color:#e2e8f0">Failed to load this.gui runtime.</div>';
          return;
        }

        const DOM_ICON_GRID = [
          "#####....####...##..#..##",
          "##..##..##..##..###.#.###",
          "##...#..#....#..##.###.##",
          "##...#..#....#..##..#..##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##..##..##..##..##.....##",
          "#####....####...##.....##",
        ];

        function createDomIcon(options) {
          if (typeof React.createElement !== "function") return null;
          const opts = options || {};
          const size = opts.size || 55;
          const title = opts.title || "DOM";
          const color =
            opts.color ||
            "var(--mui-palette-primary-main, var(--mui-palette-text-primary, #7bb0ff))";
          const cellSize = 12;
          const viewBoxWidth = DOM_ICON_GRID[0].length * cellSize;
          const viewBoxHeight = DOM_ICON_GRID.length * cellSize;
          const pixelRects = [];

          DOM_ICON_GRID.forEach((row, y) => {
            row.split("").forEach((cell, x) => {
              if (cell !== "#") return;
              pixelRects.push(
                React.createElement("rect", {
                  key: `dom-${x}-${y}`,
                  x: x * cellSize,
                  y: y * cellSize,
                  width: cellSize,
                  height: cellSize,
                  fill: "currentColor",
                  stroke: "currentColor",
                  strokeOpacity: 0.14,
                  strokeWidth: 1,
                  vectorEffect: "non-scaling-stroke",
                })
              );
            });
          });

          return React.createElement(
            "svg",
            {
              viewBox: `0 0 ${viewBoxWidth} ${viewBoxHeight}`,
              width: size,
              height: (size * viewBoxHeight) / viewBoxWidth,
              role: "img",
              "aria-label": title,
              xmlns: "http://www.w3.org/2000/svg",
              fill: "none",
              preserveAspectRatio: "xMidYMid meet",
              className: "gui-leftbar-logo-mark",
              style: {
                display: "block",
                height: "auto",
                color,
              },
            },
            React.createElement("title", null, title),
            React.createElement("g", { shapeRendering: "crispEdges" }, pixelRects)
          );
        }

        const leftBarLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "../../this/GUI/index.html",
                  title: "GUI",
                  "aria-label": "GUI",
                  className: "gui-leftbar-logo",
                },
                React.createElement("img", {
                  src: "https://res.cloudinary.com/dkwnxf6gm/image/upload/v1760629119/this.gui.neurons.me_mkapde.png",
                  alt: "this.GUI",
                  style: {
                    width: "55px",
                    height: "55px",
                    objectFit: "contain",
                    display: "block",
                  },
                }),
                React.createElement("span", { className: "gui-leftbar-logo-label" }, "GUI")
              )
            : null;

        const leftBarFooterLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "https://neurons.me/",
                  title: "neurons.me",
                  "aria-label": "neurons.me",
                  className: "gui-leftbar-footer-logo",
                },
                React.createElement("img", {
                  src: "https://neurons.me/media/neurons-grey.png",
                  alt: "neurons.me",
                  style: {
                    width: "49px",
                    height: "49px",
                    objectFit: "contain",
                    display: "block",
                  },
                })
              )
            : null;

        function createLeftBarCleakerQR() {
          if (
            !React ||
            typeof React.createElement !== "function" ||
            !GUI ||
            !GUI.CleakerQR
          ) {
            return null;
          }

          const SESSION_CREDENTIALS_EVENT = "cleaker:session:credentials-changed";
          const SESSION_USERNAME_STORAGE_KEY = "cleaker.session.username.v1";
          const SESSION_SECRET_STORAGE_KEY = "cleaker.session.secret.v1";

          function LeftBarCleakerQR() {
            const [version, setVersion] = React.useState(0);

            React.useEffect(() => {
              const rerender = () => {
                setVersion((value) => value + 1);
              };

              const handleStorage = (event) => {
                if (!event || !event.key) {
                  rerender();
                  return;
                }

                if (
                  event.key === SESSION_USERNAME_STORAGE_KEY ||
                  event.key === SESSION_SECRET_STORAGE_KEY
                ) {
                  rerender();
                }
              };

              window.addEventListener(SESSION_CREDENTIALS_EVENT, rerender);
              window.addEventListener("storage", handleStorage);

              return () => {
                window.removeEventListener(SESSION_CREDENTIALS_EVENT, rerender);
                window.removeEventListener("storage", handleStorage);
              };
            }, []);

            return React.createElement(
              "a",
              {
                className: "gui-leftbar-cleaker-qr",
                href: "https://neurons-me.github.io/Cleaker",
                title: "Cleaker",
                "aria-label": "Cleaker",
              },
              React.createElement(
                "div",
                { className: "gui-leftbar-cleaker-qr-canvas" },
                React.createElement(GUI.CleakerQR, {
                  key: `leftbar-cleaker-core-${version}`,
                  variant: "icon",
                  "data-gui-node-id": "LeftBarCleakerQR",
                  "data-gui-component": "Cleaker.QR.Icon",
                })
              ),
              React.createElement(
                "span",
                { className: "gui-leftbar-cleaker-qr-label" },
                "ME"
              )
            );
          }

          return React.createElement(LeftBarCleakerQR);
        }

        function readCleakerNamespacePreview() {
          const live =
            window && typeof window === "object"
              ? window.__cleakerNamespacePreview
              : null;

          if (live && typeof live === "object") return live;

          let namespaceExpression = "cleaker.me";
          try {
            const saved = String(localStorage.getItem("cleaker.namespace.v1") || "").trim();
            if (saved) namespaceExpression = saved;
          } catch {}

          const origin =
            typeof window !== "undefined" &&
            /^https?:\/\//i.test(String(window.location.origin || "").trim())
              ? String(window.location.origin).trim().replace(/\/+$/, "")
              : "http://localhost:8161";

          return {
            namespaceExpression,
            endpoint: origin,
            namespaceOrigin: origin,
            namespaceHost: namespaceExpression,
            rootHostNamespace: "",
            surfaceNamespace: "",
            resolverHostName: "",
            resolverDisplayName: "",
            resolverSurfaceNamespace: "",
            resolverSubjectSurfaceNamespace: "",
            namespaceUrl: "",
            subjectSurfaceNamespace: "",
            subjectHandleNamespace: "",
            rootNamespaceHash: "",
            surfaceNamespaceHash: "",
            subjectNamespaceHash: "",
          };
        }

        function sanitizeThemeScopeToken(raw) {
          return String(raw || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9._-]/g, "_");
        }

        function readGuiThemeScope() {
          const preview = readCleakerNamespacePreview();
          const rootNamespace = compactNamespaceDisplay(
            preview.resolverHostName ||
              preview.namespaceHost ||
              preview.rootHostNamespace ||
              preview.namespaceExpression ||
              "cleaker.me"
          ) || "cleaker.me";

          const subjectHandle = String(preview.subjectHandleNamespace || "").trim().toLowerCase();
          const rootScopeBase = `cleaker.gui.theme.root.${sanitizeThemeScopeToken(rootNamespace)}`;
          const rootThemeId =
            (() => {
              try {
                return String(localStorage.getItem(`${rootScopeBase}.themeId`) || "").trim();
              } catch {
                return "";
              }
            })() || DEFAULT_CLEAKER_THEME_ID;
          const rootThemeMode =
            (() => {
              try {
                return String(localStorage.getItem(`${rootScopeBase}.themeMode`) || "").trim();
              } catch {
                return "";
              }
            })() || DEFAULT_CLEAKER_THEME_MODE;

          if (subjectHandle) {
            const userScopeBase = `cleaker.gui.theme.user.${sanitizeThemeScopeToken(subjectHandle)}`;
            return {
              scopeId: `user:${subjectHandle}`,
              themeIdKey: `${userScopeBase}.themeId`,
              themeModeKey: `${userScopeBase}.themeMode`,
              defaultThemeId: rootThemeId,
              defaultMode: rootThemeMode === "dark" ? "dark" : "light",
            };
          }

          return {
            scopeId: `root:${rootNamespace}`,
            themeIdKey: `${rootScopeBase}.themeId`,
            themeModeKey: `${rootScopeBase}.themeMode`,
            defaultThemeId: DEFAULT_CLEAKER_THEME_ID,
            defaultMode: DEFAULT_CLEAKER_THEME_MODE,
          };
        }

        function syncGuiThemeScope() {
          if (typeof window === "undefined") return;
          const detail = readGuiThemeScope();
          try {
            window.__thisGuiThemeScope = () => readGuiThemeScope();
            window.dispatchEvent(
              new CustomEvent("this.gui:themeScope:changed", {
                detail,
              })
            );
          } catch {}
        }

        window.__thisGuiThemeScope = () => readGuiThemeScope();

        function readScopedThemeSelection() {
          const scope =
            typeof window.__thisGuiThemeScope === "function"
              ? window.__thisGuiThemeScope()
              : readGuiThemeScope();

          const themeIdKey = String(scope?.themeIdKey || "").trim();
          const themeModeKey = String(scope?.themeModeKey || "").trim();

          let themeId = "";
          let mode = "";
          try {
            themeId =
              String(
                (themeIdKey && localStorage.getItem(themeIdKey)) ||
                  localStorage.getItem("this.gui:themeId") ||
                  scope?.defaultThemeId ||
                  DEFAULT_CLEAKER_THEME_ID
              ).trim() || DEFAULT_CLEAKER_THEME_ID;
            mode =
              String(
                (themeModeKey && localStorage.getItem(themeModeKey)) ||
                  localStorage.getItem("this.gui:themeMode") ||
                  scope?.defaultMode ||
                  DEFAULT_CLEAKER_THEME_MODE
              ).trim() || DEFAULT_CLEAKER_THEME_MODE;
          } catch {
            themeId = String(scope?.defaultThemeId || DEFAULT_CLEAKER_THEME_ID).trim() || DEFAULT_CLEAKER_THEME_ID;
            mode = String(scope?.defaultMode || DEFAULT_CLEAKER_THEME_MODE).trim() || DEFAULT_CLEAKER_THEME_MODE;
          }

          return {
            scopeId: String(scope?.scopeId || "global").trim(),
            defaultThemeId: String(scope?.defaultThemeId || DEFAULT_CLEAKER_THEME_ID).trim() || DEFAULT_CLEAKER_THEME_ID,
            themeId,
            mode: mode === "dark" ? "dark" : "light",
          };
        }

        function createFooterThemeCatalogAction() {
          if (
            !React ||
            typeof React.createElement !== "function" ||
            !GUI ||
            !GUI.Modal ||
            !GUI.ThemesCatalog
          ) {
            return null;
          }

          const IconButton =
            (GUI.Atoms && GUI.Atoms.IconButton) ||
            GUI.IconButton ||
            null;
          const Box =
            GUI.Box ||
            (GUI.Atoms && GUI.Atoms.Box) ||
            null;
          const Typography =
            GUI.Typography ||
            (GUI.Atoms && GUI.Atoms.Typography) ||
            null;

          if (!IconButton || !Box || !Typography) return null;

          function FooterThemeCatalogAction() {
            const [open, setOpen] = React.useState(false);
            const [version, setVersion] = React.useState(0);

            React.useEffect(() => {
              const rerender = () => setVersion((value) => value + 1);
              window.addEventListener("this.gui:themeId:changed", rerender);
              window.addEventListener("this.gui:themeMode:changed", rerender);
              window.addEventListener("this.gui:themeScope:changed", rerender);
              window.addEventListener("cleaker:namespace-preview-changed", rerender);
              window.addEventListener("cleaker:session:credentials-changed", rerender);
              window.addEventListener("storage", rerender);
              return () => {
                window.removeEventListener("this.gui:themeId:changed", rerender);
                window.removeEventListener("this.gui:themeMode:changed", rerender);
                window.removeEventListener("this.gui:themeScope:changed", rerender);
                window.removeEventListener("cleaker:namespace-preview-changed", rerender);
                window.removeEventListener("cleaker:session:credentials-changed", rerender);
                window.removeEventListener("storage", rerender);
              };
            }, []);

            const themeSelection = readScopedThemeSelection();
            const scopeLabel =
              themeSelection.scopeId.startsWith("user:")
                ? `User Theme`
                : `Root Theme`;

            return React.createElement(
              React.Fragment,
              null,
              React.createElement(
                IconButton,
                {
                  key: `footer-theme-trigger-${version}`,
                  "aria-label": `Theme catalog · ${themeSelection.themeId}`,
                  title: `${scopeLabel} · ${themeSelection.themeId} · ${themeSelection.mode}`,
                  onClick: () => setOpen(true),
                  size: "small",
                  sx: {
                    color: "primary.main",
                    border: "1px solid",
                    borderColor: "divider",
                    bgcolor: "background.paper",
                    "&:hover": {
                      bgcolor: "background.nav",
                      borderColor: "primary.main",
                    },
                  },
                },
                React.createElement(GUI.Icon, { name: "palette", fontSize: 18 })
              ),
              React.createElement(
                GUI.Modal,
                {
                  open,
                  onClose: () => setOpen(false),
                  title: "Theme Catalog",
                  width: 920,
                  height: "auto",
                  blurBackground: true,
                },
                React.createElement(
                  Box,
                  {
                    sx: {
                      display: "flex",
                      flexDirection: "column",
                      gap: 1.25,
                    },
                  },
                  React.createElement(
                    Box,
                    {
                      sx: {
                        display: "flex",
                        flexDirection: "column",
                        gap: 0.35,
                        pb: 0.5,
                      },
                    },
                    React.createElement(
                      Typography,
                      {
                        variant: "body2",
                        sx: { color: "text.secondary" },
                      },
                      scopeLabel
                    ),
                    React.createElement(
                      Typography,
                      {
                        variant: "body2",
                        sx: { fontFamily: "monospace", color: "text.primary" },
                      },
                      `${themeSelection.themeId} · ${themeSelection.mode}`
                    )
                  ),
                  React.createElement(
                    Box,
                    {
                      sx: {
                        maxHeight: "72vh",
                        overflowY: "auto",
                        pr: 0.5,
                      },
                    },
                    React.createElement(GUI.ThemesCatalog, {
                      variant: "grid",
                      compact: true,
                    })
                  )
                )
              )
            );
          }

          return React.createElement(FooterThemeCatalogAction);
        }

        const themeToggle =
          typeof GUI.ThemeModeToggle === "function"
            ? React.createElement(GUI.ThemeModeToggle, {
                variant: "minimal",
                show: "icons",
                iconSize: "small",
              })
            : null;

        let leftbarResizeObserver = null;
        let leftbarObserverTarget = null;

        function setLeftbarViewClass(view) {
          const rootEl = document.documentElement;
          const isRail = view === "rail";
          rootEl.classList.toggle("gui-leftbar-rail", isRail);
          rootEl.classList.toggle("gui-leftbar-expanded", !isRail);
        }

        function inferLeftbarView(sidebar) {
          if (!sidebar) return "expanded";
          const width = Math.max(0, sidebar.getBoundingClientRect().width || 0);
          return width >= 120 ? "expanded" : "rail";
        }

        function attachLeftbarObserver() {
          const sidebar = document.querySelector(".LeftSidebar");

          if (!sidebar) {
            if (leftbarResizeObserver) {
              leftbarResizeObserver.disconnect();
              leftbarResizeObserver = null;
            }
            leftbarObserverTarget = null;
            setLeftbarViewClass("expanded");
            return;
          }

          if (sidebar === leftbarObserverTarget) return;
          leftbarObserverTarget = sidebar;

          if (leftbarResizeObserver) leftbarResizeObserver.disconnect();

          if (typeof ResizeObserver === "undefined") {
            setLeftbarViewClass(inferLeftbarView(sidebar));
            return;
          }

          leftbarResizeObserver = new ResizeObserver(() => {
            setLeftbarViewClass(inferLeftbarView(sidebar));
          });
          leftbarResizeObserver.observe(sidebar);
          setLeftbarViewClass(inferLeftbarView(sidebar));
        }

        function installLeftbarViewObserver() {
          if (window.__guiLeftbarViewObserverInstalled) {
            attachLeftbarObserver();
            return;
          }

          window.__guiLeftbarViewObserverInstalled = true;
          attachLeftbarObserver();

          if (typeof MutationObserver === "undefined") return;

          const observer = new MutationObserver(() => {
            attachLeftbarObserver();
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        function rerender() {
          syncRoute();
        }

        function normalizeRoutePath(path) {
          const raw = String(path || "").trim();
          if (!raw || raw === "#/" || raw === "#") return "/";
          const withoutHash = raw.startsWith("#") ? raw.slice(1) : raw;
          const prefixed = withoutHash.startsWith("/") ? withoutHash : `/${withoutHash}`;
          return prefixed.replace(/\/{2,}/g, "/") || "/";
        }

        function readRouteFromHash() {
          if (typeof window === "undefined") return "/";
          return normalizeRoutePath(window.location.hash || "/");
        }

        function writeRouteHash(path) {
          if (typeof window === "undefined") return;
          const normalized = normalizeRoutePath(path);
          const nextHash = normalized === "/" ? "#/" : `#${normalized}`;
          if (window.location.hash === nextHash) {
            syncRoute();
            return;
          }
          window.location.hash = nextHash;
        }

        function getBlockchainRouteProps() {
          const preview = readCleakerNamespacePreview();
          const endpoint =
            String(preview.endpoint || preview.namespaceOrigin || "").trim() ||
            "http://localhost:8161";

          return {
            endpoint,
            defaultTab: "details",
            namespaceExpression: preview.namespaceExpression || "",
            namespaceHandle: preview.namespaceHost || "",
            rootHostNamespace: preview.rootHostNamespace || "",
            surfaceNamespace: preview.surfaceNamespace || "",
            resolverHostName: preview.resolverHostName || "",
            resolverDisplayName: preview.resolverDisplayName || "",
            resolverSurfaceNamespace: preview.resolverSurfaceNamespace || "",
            resolverSubjectSurfaceNamespace: preview.resolverSubjectSurfaceNamespace || "",
            namespaceUrl: preview.namespaceUrl || "",
            subjectSurfaceNamespace: preview.subjectSurfaceNamespace || "",
            subjectHandleNamespace: preview.subjectHandleNamespace || "",
            rootNamespaceHash: preview.rootNamespaceHash || "",
            surfaceNamespaceHash: preview.surfaceNamespaceHash || "",
            subjectNamespaceHash: preview.subjectNamespaceHash || "",
          };
        }

        function compactNamespaceDisplay(raw) {
          return String(raw || "")
            .trim()
            .replace(/^https?:\/\//i, "")
            .replace(/\/+$/, "")
            .replace(/:\d+$/, "")
            .replace(/\.local$/i, "")
            .toLowerCase();
        }

        function extractGroupKeyFromPath(path) {
          const normalized = normalizeRoutePath(path);
          const match = normalized.match(/^\/groups\/([^\/]+)$/i);
          return match ? String(match[1] || "").trim().toLowerCase() : "";
        }

        function isGroupRoute(path) {
          return Boolean(extractGroupKeyFromPath(path));
        }

        function getGroupRouteProps(groupKey) {
          return {
            ...getBlockchainRouteProps(),
            groupKey,
          };
        }

        function readFooterContext(currentPath) {
          const preview = readCleakerNamespacePreview();
          const normalizedPath = normalizeRoutePath(currentPath);
          const groupKey = extractGroupKeyFromPath(normalizedPath);
          const rootNamespace = compactNamespaceDisplay(
            preview.resolverHostName ||
              preview.namespaceHost ||
              preview.rootHostNamespace ||
              preview.namespaceExpression ||
              "cleaker.me"
          ) || "cleaker.me";

          const subjectHandle = String(preview.subjectHandleNamespace || "").trim().toLowerCase();
          const subject = subjectHandle.includes(".") ? subjectHandle.split(".")[0] || "" : "";
          const scope = groupKey
            ? "me.group"
            : normalizedPath === "/chain"
              ? "me.blockchain"
              : "me.users";

          return {
            rootNamespace,
            subject,
            subjectHandle,
            scope,
            groupKey,
          };
        }

        function getInspectorEnabled() {
          return typeof GUI.getInspectorEnabled === "function"
            ? Boolean(GUI.getInspectorEnabled())
            : false;
        }

        function getAdminViewEnabled() {
          return typeof GUI.getAdminViewEnabled === "function"
            ? Boolean(GUI.getAdminViewEnabled())
            : false;
        }

        window.addEventListener("this.gui:inspector:changed", () => {
          rerender();
        });

        window.addEventListener("this.gui:adminView:changed", () => {
          rerender();
        });

        window.addEventListener("cleaker:session:credentials-changed", () => {
          syncGuiThemeScope();
          rerender();
        });

        window.addEventListener("cleaker:namespace-preview-changed", () => {
          syncGuiThemeScope();
          rerender();
        });

        window.addEventListener("storage", (event) => {
          const key = event && event.key ? String(event.key) : "";
          if (!key || key === "cleaker.session.username.v1" || key === "cleaker.namespace.v1") {
            syncGuiThemeScope();
            rerender();
          }
        });

        function buildSpec(currentPath) {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          const leftBarCleakerQR = createLeftBarCleakerQR();
          const normalizedPath = normalizeRoutePath(currentPath);
          const onChainRoute = normalizedPath === "/chain";
          const activeGroupKey = extractGroupKeyFromPath(normalizedPath) || (normalizedPath === "/groups" ? "dev-team" : "");
          const onGroupRoute = normalizedPath === "/groups" || Boolean(activeGroupKey);
          const footerContext = readFooterContext(currentPath);
          const leftBar = {
            initialView: "rail",
            elements: [
              leftBarLogo ? { type: "action", props: { element: leftBarLogo } } : null,
              leftBarCleakerQR ? { type: "action", props: { element: leftBarCleakerQR } } : null,
              {
                type: "action",
                props: {
                  element:
                    typeof React.createElement === "function"
                      ? React.createElement(
                          "a",
                          {
                            href: "../../this/DOM/index.html",
                            title: "DOM",
                            "aria-label": "DOM",
                            className: "gui-leftbar-logo",
                          },
                          createDomIcon({ size: 55, title: "DOM" })
                        )
                      : null,
                },
              },
            ].filter(Boolean),
            footerElements: [
              themeToggle
                ? { type: "action", props: { label: "Theme Mode", element: themeToggle } }
                : null,
              {
                type: "menu",
                props: {
                  label: "Settings",
                  icon: "settings",
                  items: [
                    {
                      label: adminViewEnabled ? "Admin View · ON" : "Admin View · OFF",
                      icon: adminViewEnabled ? "visibility" : "visibility_off",
                      onClick: () => {
                        if (typeof GUI.toggleAdminView === "function") {
                          GUI.toggleAdminView();
                        }
                      },
                    },
                    {
                      label: "Themes",
                      icon: "palette",
                      onClick: () => {
                        window.location.href = "../../this/GUI/themes.html";
                      },
                    },
                    {
                      label: inspectorEnabled ? "Inspector · ON" : "Inspector · OFF",
                      icon: inspectorEnabled ? "code" : "code_off",
                      onClick: () => {
                        if (typeof GUI.toggleInspector === "function") {
                          GUI.toggleInspector();
                        }
                      },
                    },
                  ],
                },
              },
              leftBarFooterLogo ? { type: "action", props: { element: leftBarFooterLogo } } : null,
            ].filter(Boolean),
          };
          const rightBar = {
            initialView: "rail",
            elements: [
              {
                type: "action",
                props: {
                  label: "Cleaker",
                  icon: "home",
                  active: !onChainRoute,
                  onClick: () => {
                    writeRouteHash("/");
                  },
                },
              },
              {
                type: "action",
                props: {
                  label: "Blockchain",
                  icon: "account_tree",
                  active: onChainRoute,
                  onClick: () => {
                    writeRouteHash("/chain");
                  },
                },
              },
              {
                type: "action",
                props: {
                  label: "Group",
                  icon: "groups",
                  active: onGroupRoute,
                  onClick: () => {
                    writeRouteHash("/groups/dev-team");
                  },
                },
              },
            ],
          };

          const footer = {
            brandLabel: footerContext.rootNamespace || "cleaker.me",
            brandLogo: "https://neurons.me/media/neurons-grey.png",
            brandHref: "#/",
            leftElements: [
              {
                type: "link",
                props: {
                  label: footerContext.scope,
                  icon: "route",
                  href: "#/",
                },
              },
            ].filter(Boolean),
            centerElements: [
              {
                type: "link",
                props: {
                  label: footerContext.rootNamespace,
                  icon: "language",
                  href: "#/",
                },
              },
              footerContext.groupKey
                ? {
                    type: "link",
                    props: {
                      label: `groups.${footerContext.groupKey}`,
                      icon: "groups",
                      href: `#/groups/${footerContext.groupKey}`,
                    },
                  }
                : null,
              footerContext.subject
                ? {
                    type: "link",
                    props: {
                      label: `@${footerContext.subject}`,
                      icon: "fingerprint",
                      href: "#/",
                    },
                  }
                : null,
              footerContext.subjectHandle
                ? {
                    type: "link",
                    props: {
                      label: footerContext.subjectHandle,
                      icon: "alternate_email",
                      href: "#/",
                    },
                  }
                : null,
            ].filter(Boolean),
            rightElements: [],
            position: "static",
          };

          const footerThemeCatalogAction = createFooterThemeCatalogAction();
          if (footerThemeCatalogAction) {
            footer.rightElements = [
              {
                type: "action",
                props: {
                  label: "Theme Catalog",
                  element: footerThemeCatalogAction,
                },
              },
            ];
          }

          const contentSpec = onGroupRoute
            ? {
                type: GUI.CleakerGroup,
                props: getGroupRouteProps(activeGroupKey),
              }
            : onChainRoute
              ? {
                  type: GUI.Blockchain,
                  props: getBlockchainRouteProps(),
                }
              : {
                  type: GUI.Cleaker,
                  props: {
                    allowLocalDaemon: false,
                  },
                };

          return {
            type: GUI.Layout,
            props: {
              leftBar,
              rightBar,
              footer,
            },
            children: [contentSpec],
          };
        }

        function renderSpec(currentPath) {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          GUI.mount(buildSpec(currentPath), root, {
            gui: GUI,
            React: window.React,
            ReactDOM: window.ReactDOM,
            inspectorEnabled,
            adminViewEnabled,
            inspectorToggleVisible: false,
          });
          installLeftbarViewObserver();
        }

        const router =
          GUI && typeof GUI.Router === "function"
            ? new GUI.Router({ useHistory: false })
            : null;

        function syncRoute() {
          const path = readRouteFromHash();
          if (router) {
            void router.navigate(path, { push: false });
            return;
          }
          renderSpec(path);
        }

        if (router) {
          router.set("/", () => buildSpec("/"));
          router.set("/chain", () => buildSpec("/chain"));
          router.set("/groups", () => buildSpec("/groups/dev-team"));
          router.set("/groups/:groupKey", ({ ctx }) => {
            const groupKey = ctx?.params?.groupKey || "dev-team";
            return buildSpec(`/groups/${groupKey}`);
          });
          router.onChange((spec) => {
            const inspectorEnabled = getInspectorEnabled();
            const adminViewEnabled = getAdminViewEnabled();
            GUI.mount(spec, root, {
              gui: GUI,
              React: window.React,
              ReactDOM: window.ReactDOM,
              inspectorEnabled,
              adminViewEnabled,
              inspectorToggleVisible: false,
            });
            installLeftbarViewObserver();
          });
        }

        if (typeof GUI.ensureRuntimeControlSurface === "function") {
          GUI.ensureRuntimeControlSurface();
        }
        syncGuiThemeScope();
        window.addEventListener("hashchange", syncRoute);
        syncRoute();
      })();
      };
    </script>
    <script>
      (function () {
        const root = document.getElementById("root");
        const assets = window.__cleakerRuntimeAssets || {};

        function showRuntimeError(message) {
          if (!root) return;
          root.innerHTML =
            '<div style="padding:24px;font:14px/1.5 ui-sans-serif,system-ui;color:#e2e8f0">' +
            String(message || "Failed to load Cleaker runtime.") +
            "</div>";
        }

        function loadStylesheet(href) {
          return new Promise((resolve, reject) => {
            if (!href) {
              resolve();
              return;
            }
            const existing = Array.from(document.querySelectorAll('link[rel="stylesheet"]')).find(
              (node) => node.getAttribute("href") === href
            );
            if (existing) {
              resolve(existing);
              return;
            }
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = href;
            link.onload = () => resolve(link);
            link.onerror = () => reject(new Error(`stylesheet failed: ${href}`));
            document.head.appendChild(link);
          });
        }

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            if (!src) {
              resolve();
              return;
            }
            const existing = Array.from(document.querySelectorAll("script[src]")).find(
              (node) => node.getAttribute("src") === src
            );
            if (existing) {
              if (existing.dataset.loaded === "true") {
                resolve(existing);
                return;
              }
              existing.addEventListener("load", () => resolve(existing), { once: true });
              existing.addEventListener(
                "error",
                () => reject(new Error(`script failed: ${src}`)),
                { once: true }
              );
              return;
            }

            const script = document.createElement("script");
            script.src = src;
            script.async = false;
            script.onload = () => {
              script.dataset.loaded = "true";
              resolve(script);
            };
            script.onerror = () => reject(new Error(`script failed: ${src}`));
            document.body.appendChild(script);
          });
        }

        async function boot() {
          try {
            await loadStylesheet(assets.css);
            await loadScript(assets.react);
            await loadScript(assets.reactdom);
            await loadScript(assets.gui);

            if (typeof window.__startCleakerApp === "function") {
              window.__startCleakerApp();
              return;
            }
            throw new Error("Cleaker bootstrap function is missing.");
          } catch (error) {
            console.error("[Cleaker] Failed to load runtime assets.", error);
            const source = assets.source ? ` from ${assets.source}` : "";
            showRuntimeError(`Failed to load Cleaker runtime${source}.`);
          }
        }

        void boot();
      })();
    </script>
  </body>
</html>
