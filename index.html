<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cleaker</title>
    <link rel="stylesheet" href="../../this/GUI/npm/dist/styles.css" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(107, 176, 255, 0.16), transparent 34%),
          radial-gradient(circle at bottom, rgba(55, 143, 92, 0.14), transparent 28%),
          #06090d;
      }

      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #f1f5f9;
      }

      .gui-leftbar-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 60px;
        justify-content: center;
        padding: 6px 10px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
      }

      .gui-leftbar-logo-mark {
        display: block;
        flex: 0 0 auto;
      }

      .gui-leftbar-logo-label {
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .gui-leftbar-rail .gui-leftbar-logo {
        justify-content: center;
        padding: 6px 6px;
      }

      .gui-leftbar-rail .gui-leftbar-logo-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-logo {
        justify-content: flex-start;
      }

      .gui-leftbar-cleaker-qr {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 72px;
        justify-content: center;
        padding: 6px 10px;
        box-sizing: border-box;
        color: inherit;
        overflow: hidden;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-cleaker-qr:hover {
        opacity: 0.92;
      }

      .gui-leftbar-cleaker-qr-canvas {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        line-height: 0;
        min-width: 0;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.QR.Icon"] {
        width: auto !important;
        display: flex !important;
        justify-content: center;
      }

      .gui-leftbar-cleaker-qr-label {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        white-space: nowrap;
        opacity: 0.88;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr {
        justify-content: center;
        padding: 6px 4px;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-cleaker-qr {
        justify-content: flex-start;
      }

      .gui-leftbar-footer-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 44px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
        opacity: 0.72;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-footer-logo:hover {
        opacity: 1;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(122, 162, 247, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(122, 162, 247, 0.08) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
        opacity: 0.18;
      }

      #root {
        min-height: 100vh;
      }

      #root > div[style*="position: fixed"] {
        display: none !important;
      }

    </style>
  </head>
  <body>

    <div id="root"></div>

    <script src="../../this/GUI/npm/node_modules/react/umd/react.production.min.js"></script>
    <script src="../../this/GUI/npm/node_modules/react-dom/umd/react-dom.production.min.js"></script>
    <script src="../../this/GUI/npm/dist/this.gui.umd.js"></script>
    <script>
      (function () {
        const root = document.getElementById("root");
        const GUI = window.GUI;
        const React = window.React;
        if (!root) return;

        if (!GUI || typeof GUI.mount !== "function" || !React) {
          root.innerHTML =
            '<div style="padding:24px;font:14px/1.5 ui-sans-serif,system-ui;color:#e2e8f0">Failed to load this.gui runtime.</div>';
          return;
        }

        const DOM_ICON_GRID = [
          "#####....####...##..#..##",
          "##..##..##..##..###.#.###",
          "##...#..#....#..##.###.##",
          "##...#..#....#..##..#..##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##..##..##..##..##.....##",
          "#####....####...##.....##",
        ];

        function createDomIcon(options) {
          if (typeof React.createElement !== "function") return null;
          const opts = options || {};
          const size = opts.size || 55;
          const title = opts.title || "DOM";
          const color =
            opts.color ||
            "var(--mui-palette-primary-main, var(--mui-palette-text-primary, #7bb0ff))";
          const cellSize = 12;
          const viewBoxWidth = DOM_ICON_GRID[0].length * cellSize;
          const viewBoxHeight = DOM_ICON_GRID.length * cellSize;
          const pixelRects = [];

          DOM_ICON_GRID.forEach((row, y) => {
            row.split("").forEach((cell, x) => {
              if (cell !== "#") return;
              pixelRects.push(
                React.createElement("rect", {
                  key: `dom-${x}-${y}`,
                  x: x * cellSize,
                  y: y * cellSize,
                  width: cellSize,
                  height: cellSize,
                  fill: "currentColor",
                  stroke: "currentColor",
                  strokeOpacity: 0.14,
                  strokeWidth: 1,
                  vectorEffect: "non-scaling-stroke",
                })
              );
            });
          });

          return React.createElement(
            "svg",
            {
              viewBox: `0 0 ${viewBoxWidth} ${viewBoxHeight}`,
              width: size,
              height: (size * viewBoxHeight) / viewBoxWidth,
              role: "img",
              "aria-label": title,
              xmlns: "http://www.w3.org/2000/svg",
              fill: "none",
              preserveAspectRatio: "xMidYMid meet",
              className: "gui-leftbar-logo-mark",
              style: {
                display: "block",
                height: "auto",
                color,
              },
            },
            React.createElement("title", null, title),
            React.createElement("g", { shapeRendering: "crispEdges" }, pixelRects)
          );
        }

        const leftBarLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "../../this/GUI/index.html",
                  title: "GUI",
                  "aria-label": "GUI",
                  className: "gui-leftbar-logo",
                },
                React.createElement("img", {
                  src: "https://res.cloudinary.com/dkwnxf6gm/image/upload/v1760629119/this.gui.neurons.me_mkapde.png",
                  alt: "this.GUI",
                  style: {
                    width: "55px",
                    height: "55px",
                    objectFit: "contain",
                    display: "block",
                  },
                }),
                React.createElement("span", { className: "gui-leftbar-logo-label" }, "GUI")
              )
            : null;

        const leftBarFooterLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "https://neurons.me/",
                  title: "neurons.me",
                  "aria-label": "neurons.me",
                  className: "gui-leftbar-footer-logo",
                },
                React.createElement("img", {
                  src: "https://neurons.me/media/neurons-grey.png",
                  alt: "neurons.me",
                  style: {
                    width: "49px",
                    height: "49px",
                    objectFit: "contain",
                    display: "block",
                  },
                })
              )
            : null;

        function createLeftBarCleakerQR() {
          if (
            !React ||
            typeof React.createElement !== "function" ||
            !GUI ||
            !GUI.CleakerQR
          ) {
            return null;
          }

          const SESSION_CREDENTIALS_EVENT = "cleaker:session:credentials-changed";
          const SESSION_USERNAME_STORAGE_KEY = "cleaker.session.username.v1";
          const SESSION_SECRET_STORAGE_KEY = "cleaker.session.secret.v1";

          function LeftBarCleakerQR() {
            const [version, setVersion] = React.useState(0);

            React.useEffect(() => {
              const rerender = () => {
                setVersion((value) => value + 1);
              };

              const handleStorage = (event) => {
                if (!event || !event.key) {
                  rerender();
                  return;
                }

                if (
                  event.key === SESSION_USERNAME_STORAGE_KEY ||
                  event.key === SESSION_SECRET_STORAGE_KEY
                ) {
                  rerender();
                }
              };

              window.addEventListener(SESSION_CREDENTIALS_EVENT, rerender);
              window.addEventListener("storage", handleStorage);

              return () => {
                window.removeEventListener(SESSION_CREDENTIALS_EVENT, rerender);
                window.removeEventListener("storage", handleStorage);
              };
            }, []);

            return React.createElement(
              "a",
              {
                className: "gui-leftbar-cleaker-qr",
                href: "https://neurons-me.github.io/Cleaker",
                title: "Cleaker",
                "aria-label": "Cleaker",
              },
              React.createElement(
                "div",
                { className: "gui-leftbar-cleaker-qr-canvas" },
                React.createElement(GUI.CleakerQR, {
                  key: `leftbar-cleaker-core-${version}`,
                  variant: "icon",
                  "data-gui-node-id": "LeftBarCleakerQR",
                  "data-gui-component": "Cleaker.QR.Icon",
                })
              ),
              React.createElement(
                "span",
                { className: "gui-leftbar-cleaker-qr-label" },
                "ME"
              )
            );
          }

          return React.createElement(LeftBarCleakerQR);
        }

        function readCleakerNamespacePreview() {
          const live =
            window && typeof window === "object"
              ? window.__cleakerNamespacePreview
              : null;

          if (live && typeof live === "object") return live;

          let namespaceExpression = "cleaker.me";
          try {
            const saved = String(localStorage.getItem("cleaker.namespace.v1") || "").trim();
            if (saved) namespaceExpression = saved;
          } catch {}

          const origin =
            typeof window !== "undefined" &&
            /^https?:\/\//i.test(String(window.location.origin || "").trim())
              ? String(window.location.origin).trim().replace(/\/+$/, "")
              : "http://localhost:8161";

          return {
            namespaceExpression,
            endpoint: origin,
            namespaceOrigin: origin,
            namespaceHost: namespaceExpression,
            rootHostNamespace: "",
            surfaceNamespace: "",
            resolverHostName: "",
            resolverDisplayName: "",
            resolverSurfaceNamespace: "",
            resolverSubjectSurfaceNamespace: "",
            namespaceUrl: "",
            subjectSurfaceNamespace: "",
            subjectHandleNamespace: "",
            rootNamespaceHash: "",
            surfaceNamespaceHash: "",
            subjectNamespaceHash: "",
          };
        }

        const themeToggle =
          typeof GUI.ThemeModeToggle === "function"
            ? React.createElement(GUI.ThemeModeToggle, {
                variant: "minimal",
                show: "icons",
                iconSize: "small",
              })
            : null;

        let leftbarResizeObserver = null;
        let leftbarObserverTarget = null;

        function setLeftbarViewClass(view) {
          const rootEl = document.documentElement;
          const isRail = view === "rail";
          rootEl.classList.toggle("gui-leftbar-rail", isRail);
          rootEl.classList.toggle("gui-leftbar-expanded", !isRail);
        }

        function inferLeftbarView(sidebar) {
          if (!sidebar) return "expanded";
          const width = Math.max(0, sidebar.getBoundingClientRect().width || 0);
          return width >= 120 ? "expanded" : "rail";
        }

        function attachLeftbarObserver() {
          const sidebar = document.querySelector(".LeftSidebar");

          if (!sidebar) {
            if (leftbarResizeObserver) {
              leftbarResizeObserver.disconnect();
              leftbarResizeObserver = null;
            }
            leftbarObserverTarget = null;
            setLeftbarViewClass("expanded");
            return;
          }

          if (sidebar === leftbarObserverTarget) return;
          leftbarObserverTarget = sidebar;

          if (leftbarResizeObserver) leftbarResizeObserver.disconnect();

          if (typeof ResizeObserver === "undefined") {
            setLeftbarViewClass(inferLeftbarView(sidebar));
            return;
          }

          leftbarResizeObserver = new ResizeObserver(() => {
            setLeftbarViewClass(inferLeftbarView(sidebar));
          });
          leftbarResizeObserver.observe(sidebar);
          setLeftbarViewClass(inferLeftbarView(sidebar));
        }

        function installLeftbarViewObserver() {
          if (window.__guiLeftbarViewObserverInstalled) {
            attachLeftbarObserver();
            return;
          }

          window.__guiLeftbarViewObserverInstalled = true;
          attachLeftbarObserver();

          if (typeof MutationObserver === "undefined") return;

          const observer = new MutationObserver(() => {
            attachLeftbarObserver();
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        function rerender() {
          syncRoute();
        }

        function normalizeRoutePath(path) {
          const raw = String(path || "").trim();
          if (!raw || raw === "#/" || raw === "#") return "/";
          const withoutHash = raw.startsWith("#") ? raw.slice(1) : raw;
          const prefixed = withoutHash.startsWith("/") ? withoutHash : `/${withoutHash}`;
          return prefixed.replace(/\/{2,}/g, "/") || "/";
        }

        function readRouteFromHash() {
          if (typeof window === "undefined") return "/";
          return normalizeRoutePath(window.location.hash || "/");
        }

        function writeRouteHash(path) {
          if (typeof window === "undefined") return;
          const normalized = normalizeRoutePath(path);
          const nextHash = normalized === "/" ? "#/" : `#${normalized}`;
          if (window.location.hash === nextHash) {
            syncRoute();
            return;
          }
          window.location.hash = nextHash;
        }

        function getBlockchainRouteProps() {
          const preview = readCleakerNamespacePreview();
          const endpoint =
            String(preview.endpoint || preview.namespaceOrigin || "").trim() ||
            "http://localhost:8161";

          return {
            endpoint,
            defaultTab: "details",
            namespaceExpression: preview.namespaceExpression || "",
            namespaceHandle: preview.namespaceHost || "",
            rootHostNamespace: preview.rootHostNamespace || "",
            surfaceNamespace: preview.surfaceNamespace || "",
            resolverHostName: preview.resolverHostName || "",
            resolverDisplayName: preview.resolverDisplayName || "",
            resolverSurfaceNamespace: preview.resolverSurfaceNamespace || "",
            resolverSubjectSurfaceNamespace: preview.resolverSubjectSurfaceNamespace || "",
            namespaceUrl: preview.namespaceUrl || "",
            subjectSurfaceNamespace: preview.subjectSurfaceNamespace || "",
            subjectHandleNamespace: preview.subjectHandleNamespace || "",
            rootNamespaceHash: preview.rootNamespaceHash || "",
            surfaceNamespaceHash: preview.surfaceNamespaceHash || "",
            subjectNamespaceHash: preview.subjectNamespaceHash || "",
          };
        }

        function compactNamespaceDisplay(raw) {
          return String(raw || "")
            .trim()
            .replace(/^https?:\/\//i, "")
            .replace(/\/+$/, "")
            .replace(/:\d+$/, "")
            .replace(/\.local$/i, "")
            .toLowerCase();
        }

        function readFooterContext(currentPath) {
          const preview = readCleakerNamespacePreview();
          const normalizedPath = normalizeRoutePath(currentPath);
          const rootNamespace = compactNamespaceDisplay(
            preview.resolverHostName ||
              preview.namespaceHost ||
              preview.rootHostNamespace ||
              preview.namespaceExpression ||
              "cleaker.me"
          ) || "cleaker.me";

          const subjectHandle = String(preview.subjectHandleNamespace || "").trim().toLowerCase();
          const subject = subjectHandle.includes(".") ? subjectHandle.split(".")[0] || "" : "";
          const scope = normalizedPath === "/chain" ? "me.blockchain" : "me.users";

          return {
            rootNamespace,
            subject,
            subjectHandle,
            scope,
          };
        }

        function getInspectorEnabled() {
          return typeof GUI.getInspectorEnabled === "function"
            ? Boolean(GUI.getInspectorEnabled())
            : false;
        }

        function getAdminViewEnabled() {
          return typeof GUI.getAdminViewEnabled === "function"
            ? Boolean(GUI.getAdminViewEnabled())
            : false;
        }

        window.addEventListener("this.gui:inspector:changed", () => {
          rerender();
        });

        window.addEventListener("this.gui:adminView:changed", () => {
          rerender();
        });

        window.addEventListener("cleaker:session:credentials-changed", () => {
          rerender();
        });

        window.addEventListener("storage", (event) => {
          const key = event && event.key ? String(event.key) : "";
          if (!key || key === "cleaker.session.username.v1" || key === "cleaker.namespace.v1") {
            rerender();
          }
        });

        function buildSpec(currentPath) {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          const leftBarCleakerQR = createLeftBarCleakerQR();
          const onChainRoute = normalizeRoutePath(currentPath) === "/chain";
          const footerContext = readFooterContext(currentPath);
          const leftBar = {
            initialView: "rail",
            elements: [
              leftBarLogo ? { type: "action", props: { element: leftBarLogo } } : null,
              leftBarCleakerQR ? { type: "action", props: { element: leftBarCleakerQR } } : null,
              {
                type: "action",
                props: {
                  element:
                    typeof React.createElement === "function"
                      ? React.createElement(
                          "a",
                          {
                            href: "../../this/DOM/index.html",
                            title: "DOM",
                            "aria-label": "DOM",
                            className: "gui-leftbar-logo",
                          },
                          createDomIcon({ size: 55, title: "DOM" })
                        )
                      : null,
                },
              },
            ].filter(Boolean),
            footerElements: [
              themeToggle
                ? { type: "action", props: { label: "Theme Mode", element: themeToggle } }
                : null,
              {
                type: "menu",
                props: {
                  label: "Settings",
                  icon: "settings",
                  items: [
                    {
                      label: adminViewEnabled ? "Admin View · ON" : "Admin View · OFF",
                      icon: adminViewEnabled ? "visibility" : "visibility_off",
                      onClick: () => {
                        if (typeof GUI.toggleAdminView === "function") {
                          GUI.toggleAdminView();
                        }
                      },
                    },
                    {
                      label: "Themes",
                      icon: "palette",
                      onClick: () => {
                        window.location.href = "../../this/GUI/themes.html";
                      },
                    },
                    {
                      label: inspectorEnabled ? "Inspector · ON" : "Inspector · OFF",
                      icon: inspectorEnabled ? "code" : "code_off",
                      onClick: () => {
                        if (typeof GUI.toggleInspector === "function") {
                          GUI.toggleInspector();
                        }
                      },
                    },
                  ],
                },
              },
              leftBarFooterLogo ? { type: "action", props: { element: leftBarFooterLogo } } : null,
            ].filter(Boolean),
          };
          const rightBar = {
            initialView: "rail",
            elements: [
              {
                type: "action",
                props: {
                  label: "Cleaker",
                  icon: "home",
                  active: !onChainRoute,
                  onClick: () => {
                    writeRouteHash("/");
                  },
                },
              },
              {
                type: "action",
                props: {
                  label: "Blockchain",
                  icon: "account_tree",
                  active: onChainRoute,
                  onClick: () => {
                    writeRouteHash("/chain");
                  },
                },
              },
            ],
          };

          const footer = {
            brandLabel: footerContext.rootNamespace || "cleaker.me",
            brandLogo: "https://neurons.me/media/neurons-grey.png",
            brandHref: "#/",
            leftElements: [
              {
                type: "link",
                props: {
                  label: footerContext.scope,
                  icon: "route",
                  href: "#/",
                },
              },
            ].filter(Boolean),
            centerElements: [
              {
                type: "link",
                props: {
                  label: footerContext.rootNamespace,
                  icon: "language",
                  href: "#/",
                },
              },
              footerContext.subject
                ? {
                    type: "link",
                    props: {
                      label: `@${footerContext.subject}`,
                      icon: "fingerprint",
                      href: "#/",
                    },
                  }
                : null,
              footerContext.subjectHandle
                ? {
                    type: "link",
                    props: {
                      label: footerContext.subjectHandle,
                      icon: "alternate_email",
                      href: "#/",
                    },
                  }
                : null,
            ].filter(Boolean),
            rightElements: [],
            position: "static",
          };

          const contentSpec = onChainRoute
            ? {
                type: GUI.Blockchain,
                props: getBlockchainRouteProps(),
              }
            : {
                type: GUI.Cleaker,
                props: {
                  allowLocalDaemon: false,
                },
              };

          return {
            type: GUI.Layout,
            props: {
              leftBar,
              rightBar,
              footer,
            },
            children: [contentSpec],
          };
        }

        function renderSpec(currentPath) {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          GUI.mount(buildSpec(currentPath), root, {
            gui: GUI,
            React: window.React,
            ReactDOM: window.ReactDOM,
            inspectorEnabled,
            adminViewEnabled,
            inspectorToggleVisible: false,
          });
          installLeftbarViewObserver();
        }

        const router =
          GUI && typeof GUI.Router === "function"
            ? new GUI.Router({ useHistory: false })
            : null;

        function syncRoute() {
          const path = readRouteFromHash();
          if (router) {
            void router.navigate(path, { push: false });
            return;
          }
          renderSpec(path);
        }

        if (router) {
          router.set("/", () => buildSpec("/"));
          router.set("/chain", () => buildSpec("/chain"));
          router.onChange((spec) => {
            const inspectorEnabled = getInspectorEnabled();
            const adminViewEnabled = getAdminViewEnabled();
            GUI.mount(spec, root, {
              gui: GUI,
              React: window.React,
              ReactDOM: window.ReactDOM,
              inspectorEnabled,
              adminViewEnabled,
              inspectorToggleVisible: false,
            });
            installLeftbarViewObserver();
          });
        }

        if (typeof GUI.ensureRuntimeControlSurface === "function") {
          GUI.ensureRuntimeControlSurface();
        }
        window.addEventListener("hashchange", syncRoute);
        syncRoute();
      })();
    </script>
  </body>
</html>
