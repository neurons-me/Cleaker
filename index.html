<body>
<div id="root"></div>
<!--Load...

<script
  src="../../this/GUI/npm/dist/this.gui.bootstrap.umd.js"
  crossorigin="anonymous"></script>
<!--load...
▄ ▄▄▄▄  ▗▞▀▚▖
  █ █ █ ▐▛▀▀▘
  █   █ ▝▚▄▄▖ -->
<script
  src="../../this/.me/npm/dist/me.umd.js"
  crossorigin="anonymous"></script>
<script src="./routes.js"></script>
<script>
  (async function () {
    const root = document.getElementById("root");
    await window.GUI.bootstrap();
    const GUI = window.GUI;
    const me = new Me();
    const runtime = GUI.render(me);
    const router = GUI.router(root, {
      runtime: runtime,
      useHistory: false,
    });

    if (typeof window.registerRoutes === "function") {
      window.registerRoutes(router);
    }

    await router.start("/");

  })().catch(function (error) {
    const root = document.getElementById("root");
    if (root) root.textContent = error.message || String(error);
  });
</script>

  </body>
</html>
