<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cleaker</title>
    <link rel="stylesheet" href="../../this/GUI/npm/dist/styles.css" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(107, 176, 255, 0.16), transparent 34%),
          radial-gradient(circle at bottom, rgba(55, 143, 92, 0.14), transparent 28%),
          #06090d;
      }

      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #f1f5f9;
      }

      .gui-leftbar-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 60px;
        justify-content: center;
        padding: 6px 10px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
      }

      .gui-leftbar-logo-mark {
        display: block;
        flex: 0 0 auto;
      }

      .gui-leftbar-logo-label {
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .gui-leftbar-rail .gui-leftbar-logo {
        justify-content: center;
        padding: 6px 6px;
      }

      .gui-leftbar-rail .gui-leftbar-logo-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-logo {
        justify-content: flex-start;
      }

      .gui-leftbar-cleaker-qr {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 72px;
        justify-content: center;
        padding: 6px 10px;
        box-sizing: border-box;
        color: inherit;
        overflow: hidden;
        text-decoration: none;
        cursor: pointer;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-cleaker-qr:hover {
        opacity: 0.92;
      }

      .gui-leftbar-cleaker-qr-canvas {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        line-height: 0;
        min-width: 0;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker"] {
        width: auto !important;
        display: flex !important;
        justify-content: center;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.Card"] {
        width: auto !important;
        max-width: none !important;
        padding: 0 !important;
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.Header"] {
        gap: 0 !important;
        margin-bottom: 0 !important;
        justify-content: center !important;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.IdentityShell"],
      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.ClaimState"],
      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.Controls"] {
        display: none !important;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.AvatarQR"] {
        width: 58px !important;
        height: 58px !important;
        min-width: 58px !important;
        min-height: 58px !important;
        cursor: default !important;
        pointer-events: none;
        transition: none !important;
      }

      .gui-leftbar-cleaker-qr [data-gui-component="Cleaker.AvatarQR"] svg {
        width: 58px !important;
        height: 58px !important;
      }

      .gui-leftbar-cleaker-qr-label {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        white-space: nowrap;
        opacity: 0.88;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr {
        justify-content: center;
        padding: 6px 4px;
      }

      .gui-leftbar-rail .gui-leftbar-cleaker-qr-label {
        display: none;
      }

      .gui-leftbar-expanded .gui-leftbar-cleaker-qr {
        justify-content: flex-start;
      }

      .gui-leftbar-footer-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 44px;
        text-decoration: none;
        color: inherit;
        box-sizing: border-box;
        opacity: 0.72;
        transition: opacity 160ms ease;
      }

      .gui-leftbar-footer-logo:hover {
        opacity: 1;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(122, 162, 247, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(122, 162, 247, 0.08) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
        opacity: 0.18;
      }

      #root {
        min-height: 100vh;
      }

      #root > div[style*="position: fixed"] {
        display: none !important;
      }

      .cleaker-seed-legend {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 20;
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(123, 176, 255, 0.18);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)),
          rgba(6, 9, 13, 0.72);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(18px) saturate(125%);
        overflow: hidden;
      }

      .cleaker-seed-legend::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(122, 162, 247, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(122, 162, 247, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: radial-gradient(circle at center, black 34%, transparent 88%);
        opacity: 0.22;
      }

      .cleaker-seed-legend-inner {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 18px 18px 16px;
      }

      .cleaker-seed-legend-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.72);
      }

      .cleaker-seed-legend-flow {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }

      .cleaker-seed-node {
        min-width: 0;
        border-radius: 16px;
        border: 1px solid rgba(123, 176, 255, 0.16);
        background:
          radial-gradient(circle at top, rgba(107, 176, 255, 0.12), transparent 64%),
          rgba(10, 14, 19, 0.82);
        padding: 12px 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .cleaker-seed-node-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.56);
      }

      .cleaker-seed-node-value {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #f8fafc;
        word-break: break-word;
      }

      .cleaker-seed-node-value--accent {
        color: #7bb0ff;
      }

      .cleaker-seed-arrow {
        font-size: 16px;
        line-height: 1;
        color: rgba(123, 176, 255, 0.78);
        user-select: none;
      }

      .cleaker-seed-surfaces {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .cleaker-seed-surface {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.72);
        padding: 6px 10px;
        font-size: 11px;
        color: rgba(226, 232, 240, 0.84);
      }

      .cleaker-seed-surface-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(103, 232, 249, 0.8);
        box-shadow: 0 0 8px rgba(103, 232, 249, 0.35);
        flex: 0 0 auto;
      }

      .cleaker-seed-legend-note {
        font-size: 12px;
        line-height: 1.5;
        color: rgba(226, 232, 240, 0.74);
      }

      @media (max-width: 860px) {
        .cleaker-seed-legend {
          left: 16px;
          right: 16px;
          bottom: 16px;
          width: auto;
        }

        .cleaker-seed-legend-flow {
          grid-template-columns: 1fr;
        }

        .cleaker-seed-arrow {
          transform: rotate(90deg);
          justify-self: center;
        }
      }
    </style>
  </head>
  <body>

    <div id="root"></div>

    <aside class="cleaker-seed-legend" aria-label="Cleaker seed model">
      <div class="cleaker-seed-legend-inner">
        <div class="cleaker-seed-legend-title">Seed Namespace</div>

        <div class="cleaker-seed-legend-flow">
          <div class="cleaker-seed-node">
            <div class="cleaker-seed-node-label">Cleaker</div>
            <div class="cleaker-seed-node-value">cleaker</div>
          </div>

          <div class="cleaker-seed-arrow">→</div>

          <div class="cleaker-seed-node">
            <div class="cleaker-seed-node-label">Seed</div>
            <div class="cleaker-seed-node-value"><span class="cleaker-seed-node-value--accent">.me</span></div>
          </div>

          <div class="cleaker-seed-arrow">→</div>

          <div class="cleaker-seed-node">
            <div class="cleaker-seed-node-label">Crypto Seed</div>
            <div class="cleaker-seed-node-value">cleaker<span class="cleaker-seed-node-value--accent">(me)</span></div>
          </div>
        </div>

        <div class="cleaker-seed-surfaces" aria-label="Reconstructible surfaces">
          <div class="cleaker-seed-surface"><span class="cleaker-seed-surface-dot"></span>iphone</div>
          <div class="cleaker-seed-surface"><span class="cleaker-seed-surface-dot"></span>desktop</div>
          <div class="cleaker-seed-surface"><span class="cleaker-seed-surface-dot"></span>cloud</div>
        </div>

        <div class="cleaker-seed-legend-note">
          A minimal seed namespace that reconstructs the same identity on any available surface.
        </div>
      </div>
    </aside>

    <script src="../../this/GUI/npm/node_modules/react/umd/react.production.min.js"></script>
    <script src="../../this/GUI/npm/node_modules/react-dom/umd/react-dom.production.min.js"></script>
    <script src="../../this/GUI/npm/dist/this.gui.umd.js"></script>
    <script>
      (function () {
        const root = document.getElementById("root");
        const GUI = window.GUI;
        const React = window.React;

        if (!root) return;

        if (!GUI || typeof GUI.mount !== "function" || !React) {
          root.innerHTML =
            '<div style="padding:24px;font:14px/1.5 ui-sans-serif,system-ui;color:#e2e8f0">Failed to load this.gui runtime.</div>';
          return;
        }

        const DOM_ICON_GRID = [
          "#####....####...##..#..##",
          "##..##..##..##..###.#.###",
          "##...#..#....#..##.###.##",
          "##...#..#....#..##..#..##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##...#..#....#..##.....##",
          "##..##..##..##..##.....##",
          "#####....####...##.....##",
        ];

        function createDomIcon(options) {
          if (typeof React.createElement !== "function") return null;
          const opts = options || {};
          const size = opts.size || 55;
          const title = opts.title || "DOM";
          const color =
            opts.color ||
            "var(--mui-palette-primary-main, var(--mui-palette-text-primary, #7bb0ff))";
          const cellSize = 12;
          const viewBoxWidth = DOM_ICON_GRID[0].length * cellSize;
          const viewBoxHeight = DOM_ICON_GRID.length * cellSize;
          const pixelRects = [];

          DOM_ICON_GRID.forEach((row, y) => {
            row.split("").forEach((cell, x) => {
              if (cell !== "#") return;
              pixelRects.push(
                React.createElement("rect", {
                  key: `dom-${x}-${y}`,
                  x: x * cellSize,
                  y: y * cellSize,
                  width: cellSize,
                  height: cellSize,
                  fill: "currentColor",
                  stroke: "currentColor",
                  strokeOpacity: 0.14,
                  strokeWidth: 1,
                  vectorEffect: "non-scaling-stroke",
                })
              );
            });
          });

          return React.createElement(
            "svg",
            {
              viewBox: `0 0 ${viewBoxWidth} ${viewBoxHeight}`,
              width: size,
              height: (size * viewBoxHeight) / viewBoxWidth,
              role: "img",
              "aria-label": title,
              xmlns: "http://www.w3.org/2000/svg",
              fill: "none",
              preserveAspectRatio: "xMidYMid meet",
              className: "gui-leftbar-logo-mark",
              style: {
                display: "block",
                height: "auto",
                color,
              },
            },
            React.createElement("title", null, title),
            React.createElement("g", { shapeRendering: "crispEdges" }, pixelRects)
          );
        }

        const leftBarLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "../../this/GUI/index.html",
                  title: "GUI",
                  "aria-label": "GUI",
                  className: "gui-leftbar-logo",
                },
                React.createElement("img", {
                  src: "https://res.cloudinary.com/dkwnxf6gm/image/upload/v1760629119/this.gui.neurons.me_mkapde.png",
                  alt: "this.GUI",
                  style: {
                    width: "55px",
                    height: "55px",
                    objectFit: "contain",
                    display: "block",
                  },
                }),
                React.createElement("span", { className: "gui-leftbar-logo-label" }, "GUI")
              )
            : null;

        const leftBarFooterLogo =
          typeof React.createElement === "function"
            ? React.createElement(
                "a",
                {
                  href: "https://neurons.me/",
                  title: "neurons.me",
                  "aria-label": "neurons.me",
                  className: "gui-leftbar-footer-logo",
                },
                React.createElement("img", {
                  src: "https://neurons.me/media/neurons-grey.png",
                  alt: "neurons.me",
                  style: {
                    width: "49px",
                    height: "49px",
                    objectFit: "contain",
                    display: "block",
                  },
                })
              )
            : null;

        function createLeftBarCleakerQR() {
          if (
            !React ||
            typeof React.createElement !== "function" ||
            !GUI ||
            !GUI.Cleaker
          ) {
            return null;
          }

          const SESSION_CREDENTIALS_EVENT = "cleaker:session:credentials-changed";
          const SESSION_USERNAME_STORAGE_KEY = "cleaker.session.username.v1";
          const SESSION_SECRET_STORAGE_KEY = "cleaker.session.secret.v1";

          function LeftBarCleakerQR() {
            const [version, setVersion] = React.useState(0);

            React.useEffect(() => {
              const rerender = () => {
                setVersion((value) => value + 1);
              };

              const handleStorage = (event) => {
                if (!event || !event.key) {
                  rerender();
                  return;
                }

                if (
                  event.key === SESSION_USERNAME_STORAGE_KEY ||
                  event.key === SESSION_SECRET_STORAGE_KEY
                ) {
                  rerender();
                }
              };

              window.addEventListener(SESSION_CREDENTIALS_EVENT, rerender);
              window.addEventListener("storage", handleStorage);

              return () => {
                window.removeEventListener(SESSION_CREDENTIALS_EVENT, rerender);
                window.removeEventListener("storage", handleStorage);
              };
            }, []);

            return React.createElement(
              "a",
              {
                className: "gui-leftbar-cleaker-qr",
                href: "https://neurons-me.github.io/Cleaker",
                title: "Cleaker",
                "aria-label": "Cleaker",
              },
              React.createElement(
                "div",
                { className: "gui-leftbar-cleaker-qr-canvas" },
                React.createElement(GUI.Cleaker, {
                  key: `leftbar-cleaker-core-${version}`,
                  "data-gui-node-id": "LeftBarCleakerQR.Core",
                  "data-gui-component": "Cleaker.LeftBarQR.Core",
                })
              ),
              React.createElement(
                "span",
                { className: "gui-leftbar-cleaker-qr-label" },
                "ME"
              )
            );
          }

          return React.createElement(LeftBarCleakerQR);
        }

        const themeToggle =
          typeof GUI.ThemeModeToggle === "function"
            ? React.createElement(GUI.ThemeModeToggle, {
                variant: "minimal",
                show: "icons",
                iconSize: "small",
              })
            : null;

        let leftbarResizeObserver = null;
        let leftbarObserverTarget = null;

        function setLeftbarViewClass(view) {
          const rootEl = document.documentElement;
          const isRail = view === "rail";
          rootEl.classList.toggle("gui-leftbar-rail", isRail);
          rootEl.classList.toggle("gui-leftbar-expanded", !isRail);
        }

        function inferLeftbarView(sidebar) {
          if (!sidebar) return "expanded";
          const width = Math.max(0, sidebar.getBoundingClientRect().width || 0);
          return width >= 120 ? "expanded" : "rail";
        }

        function attachLeftbarObserver() {
          const sidebar = document.querySelector(".LeftSidebar");

          if (!sidebar) {
            if (leftbarResizeObserver) {
              leftbarResizeObserver.disconnect();
              leftbarResizeObserver = null;
            }
            leftbarObserverTarget = null;
            setLeftbarViewClass("expanded");
            return;
          }

          if (sidebar === leftbarObserverTarget) return;
          leftbarObserverTarget = sidebar;

          if (leftbarResizeObserver) leftbarResizeObserver.disconnect();

          if (typeof ResizeObserver === "undefined") {
            setLeftbarViewClass(inferLeftbarView(sidebar));
            return;
          }

          leftbarResizeObserver = new ResizeObserver(() => {
            setLeftbarViewClass(inferLeftbarView(sidebar));
          });
          leftbarResizeObserver.observe(sidebar);
          setLeftbarViewClass(inferLeftbarView(sidebar));
        }

        function installLeftbarViewObserver() {
          if (window.__guiLeftbarViewObserverInstalled) {
            attachLeftbarObserver();
            return;
          }

          window.__guiLeftbarViewObserverInstalled = true;
          attachLeftbarObserver();

          if (typeof MutationObserver === "undefined") return;

          const observer = new MutationObserver(() => {
            attachLeftbarObserver();
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        function rerender() {
          renderSpec();
        }

        function getInspectorEnabled() {
          return typeof GUI.getInspectorEnabled === "function"
            ? Boolean(GUI.getInspectorEnabled())
            : false;
        }

        function getAdminViewEnabled() {
          return typeof GUI.getAdminViewEnabled === "function"
            ? Boolean(GUI.getAdminViewEnabled())
            : false;
        }

        window.addEventListener("this.gui:inspector:changed", () => {
          rerender();
        });

        window.addEventListener("this.gui:adminView:changed", () => {
          rerender();
        });

        function buildSpec() {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          const leftBarCleakerQR = createLeftBarCleakerQR();
          const leftBar = {
            initialView: "rail",
            elements: [
              leftBarLogo ? { type: "action", props: { element: leftBarLogo } } : null,
              leftBarCleakerQR ? { type: "action", props: { element: leftBarCleakerQR } } : null,
              {
                type: "action",
                props: {
                  element:
                    typeof React.createElement === "function"
                      ? React.createElement(
                          "a",
                          {
                            href: "../../this/DOM/index.html",
                            title: "DOM",
                            "aria-label": "DOM",
                            className: "gui-leftbar-logo",
                          },
                          createDomIcon({ size: 55, title: "DOM" })
                        )
                      : null,
                },
              },
            ].filter(Boolean),
            footerElements: [
              themeToggle
                ? { type: "action", props: { label: "Theme Mode", element: themeToggle } }
                : null,
              {
                type: "menu",
                props: {
                  label: "Settings",
                  icon: "settings",
                  items: [
                    {
                      label: adminViewEnabled ? "Admin View · ON" : "Admin View · OFF",
                      icon: adminViewEnabled ? "visibility" : "visibility_off",
                      onClick: () => {
                        if (typeof GUI.toggleAdminView === "function") {
                          GUI.toggleAdminView();
                        }
                      },
                    },
                    {
                      label: "Themes",
                      icon: "palette",
                      onClick: () => {
                        window.location.href = "../../this/GUI/themes.html";
                      },
                    },
                    {
                      label: inspectorEnabled ? "Inspector · ON" : "Inspector · OFF",
                      icon: inspectorEnabled ? "code" : "code_off",
                      onClick: () => {
                        if (typeof GUI.toggleInspector === "function") {
                          GUI.toggleInspector();
                        }
                      },
                    },
                  ],
                },
              },
              leftBarFooterLogo ? { type: "action", props: { element: leftBarFooterLogo } } : null,
            ].filter(Boolean),
          };

          return {
            type: GUI.Layout,
            props: {
              leftBar,
            },
            children: [
              {
                type: GUI.Cleaker,
              },
            ],
          };
        }

        function renderSpec() {
          const inspectorEnabled = getInspectorEnabled();
          const adminViewEnabled = getAdminViewEnabled();
          GUI.mount(buildSpec(), root, {
            gui: GUI,
            React: window.React,
            ReactDOM: window.ReactDOM,
            inspectorEnabled,
            adminViewEnabled,
            inspectorToggleVisible: false,
          });
          installLeftbarViewObserver();
        }

        if (typeof GUI.ensureRuntimeControlSurface === "function") {
          GUI.ensureRuntimeControlSurface();
        }
        renderSpec();
      })();
    </script>
  </body>
</html>
